      <stop offset="0" stop-color="#1a0a2e" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#2d1b4e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f0f23" stop-opacity="0.9"/>
